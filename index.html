<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Links</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .section {
            margin-bottom: 40px;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .button-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }
        @media (max-width: 599px) {
            .button {
                width: 100% !important;
            }
        }
        h2 {
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #ffffff;
        }
        .button {
            display: block;
            width: 180px;
            padding: 20px;
            margin: 10px 0;
            background: linear-gradient(135deg, #0056b3, #003d82);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid #ffffff;
            white-space: normal;
            overflow-wrap: break-word;
        }
        .button:hover {
            background: linear-gradient(135deg, #003d82, #002040);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            transform: translateY(-2px);
        }

    </style>
</head>
<body>
    <div class="container">
        
        <div class="section">
            <h2>Shows & Movies</h2>
            <div class="button-container">
                <a href="https://ww4.fmovies.co/26/" target="_blank" class="button">FMovies</a>
                <a href="https://myflixerz.day/" target="_blank" class="button">MyFlixer</a>
                <a href="https://1moviesz.to/" target="_blank" class="button">1Movies</a>
                <a href="https://movieuniverse.lol/" target="_blank" class="button">MovieUniverse</a>
                <a href="https://ww8.123moviesfree.net/" target="_blank" class="button">123Movies</a>
                <a href="https://bbflix.watch/" target="_blank" class="button">Bflix</a>
            </div>
        </div>
        
        <div class="section">
            <h2>Sports</h2>
            <div class="button-container">
                <a href="https://strmd.link/" target="_blank" class="button">Streamed</a>
                <a href="https://old.ppv.to/" target="_blank" class="button">PPV.to</a>
                <a href="https://the-tv.app/" target="_blank" class="button">TheTVApp</a>
                <a href="https://sportsurge.ws/" target="_blank" class="button">Sportsurge</a>
                <a href="https://methstreams.ms/" target="_blank" class="button">MethStreams</a>
                <a href="https://crackstreams.ms/" target="_blank" class="button">CrackStreams</a>
                <a href="https://v4.gostreameast.link/" target="_blank" class="button">StreamEast</a>
                <a href="https://vipstand.cc/" target="_blank" class="button">VIPStand</a>
                <a href="https://www.vipbox.lc/" target="_blank" class="button">VIPBox</a>
                <a href="https://www.vipleague.ws/" target="_blank" class="button">VIPLeague</a>
                <a href="https://www.nflbite.is/" target="_blank" class="button">NFLBite</a>
                <a href="https://livetv.sx/enx/" target="_blank" class="button">LiveTV</a>
                <a href="https://sportsbay.dk/" target="_blank" class="button">SportsBay</a>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.button').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                window.open(this.href, '_blank');
            });
        });
    </script>
</body>
</html>
